<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wobbly Architect Lab</title>

<style>

body{
margin:0;
font-family:Comic Sans MS, cursive;
background:linear-gradient(120deg,#ff8ad8,#7afcff,#fff07a);
min-height:200vh;
overflow-x:hidden;
}

h1{
text-align:center;
padding:40px;
font-size:50px;
}

/* BUILDINGS */

.city{
display:flex;
justify-content:center;
gap:60px;
margin-top:50px;
}

.building{
width:120px;
height:220px;
background:#ff4d6d;
border-radius:10px;
position:relative;
transition:0.3s;
}

.building:nth-child(2){background:#8338ec;}
.building:nth-child(3){background:#06d6a0;}

.window{
width:20px;
height:20px;
background:white;
position:absolute;
}

.window:nth-child(1){top:30px;left:20px;}
.window:nth-child(2){top:30px;right:20px;}
.window:nth-child(3){top:80px;left:20px;}
.window:nth-child(4){top:80px;right:20px;}

/* COLLAPSE */

.collapsed{
transform:rotate(90deg) scaleY(0.2);
opacity:0.7;
}

/* DRAG WALL */

.wall{
width:300px;
height:20px;
background:#333;
margin:120px auto;
cursor:grab;
position:relative;
}

/* FLOORPLAN */

.floorplan{
width:200px;
height:200px;
margin:120px auto;
border:5px dashed black;
position:relative;
animation:spin 8s linear infinite;
}

.room{
position:absolute;
border:3px solid black;
background:rgba(255,255,255,0.5);
}

.r1{width:80px;height:80px;top:10px;left:10px;}
.r2{width:80px;height:80px;top:10px;right:10px;}
.r3{width:160px;height:70px;bottom:10px;left:15px;}

@keyframes spin{
from{transform:rotate(0)}
to{transform:rotate(360deg)}
}

.label{
text-align:center;
font-size:20px;
margin-top:20px;
}

</style>
</head>

<body>

<h1>🏛️ Professor Wobble's Architecture Lab</h1>

<div class="label">Scroll to make buildings panic</div>

<div class="city">

<div class="building" onclick="collapse(this)">
<div class="window"></div>
<div class="window"></div>
<div class="window"></div>
<div class="window"></div>
</div>

<div class="building" onclick="collapse(this)">
<div class="window"></div>
<div class="window"></div>
<div class="window"></div>
<div class="window"></div>
</div>

<div class="building" onclick="collapse(this)">
<div class="window"></div>
<div class="window"></div>
<div class="window"></div>
<div class="window"></div>
</div>

</div>

<div class="label">Drag the wall (zoning laws optional)</div>

<div class="wall" id="wall"></div>

<div class="label">Rotating floorplan of a very confusing house</div>

<div class="floorplan">

<div class="room r1"></div>
<div class="room r2"></div>
<div class="room r3"></div>

</div>

<script>

/* SCROLL WIGGLE BUILDINGS */

const buildings=document.querySelectorAll(".building");

window.addEventListener("scroll",()=>{

let scroll=window.scrollY;

buildings.forEach((b,i)=>{
let wiggle=Math.sin(scroll*0.01+i)*15;
b.style.transform=`rotate(${wiggle}deg)`;
});

});

/* COLLAPSE */

function collapse(el){
el.classList.toggle("collapsed");
}

/* DRAG WALL */

let wall=document.getElementById("wall");
let isDragging=false;

wall.addEventListener("mousedown",()=>{
isDragging=true;
wall.style.cursor="grabbing";
});

document.addEventListener("mouseup",()=>{
isDragging=false;
wall.style.cursor="grab";
});

document.addEventListener("mousemove",(e)=>{
if(isDragging){
wall.style.transform=`translateX(${e.movementX}px)`;
}
});

</script>

</body>
</html>
